name: Mobile Smoke

on:
  pull_request:
    branches: [main]
    paths:
      - 'crm-app/**'
      - '.github/workflows/mobile-smoke.yml'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target baseURL to smoke (defaults to prod)'
        required: false
        default: 'https://crmphone.merkazneshama.co.il'

concurrency:
  group: mobile-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CRM_SMOKE_BASE_URL: ${{ github.event.inputs.base_url || 'https://crmphone.merkazneshama.co.il' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: crm-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: crm-app

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('crm-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: crm-app

      - name: Run mobile smoke
        run: npm run test:mobile-smoke
        working-directory: crm-app

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            crm-app/playwright-report/
            crm-app/test-results/
          retention-days: 7
